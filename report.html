<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>报告详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    :root {
      --color-primary: #2563EB;
      --color-primary-light: #DBEAFE;
      --color-bg: #F0F7FF;
      --color-surface: #FFFFFF;
      --color-text: #0F172A;
      --color-text-secondary: #475569;
      --color-text-muted: #94A3B8;
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
      background: var(--color-bg);
      color: var(--color-text-secondary);
    }

    .press { transition: transform 0.12s ease; }
    .press:active { transform: scale(0.97); }

    .card {
      background: var(--color-surface);
      border-radius: 1.25rem;
      box-shadow: 0 1px 3px rgba(37, 99, 235, 0.06), 0 4px 12px rgba(37, 99, 235, 0.08);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 0.875rem;
    }

    .section-title::before {
      content: '';
      width: 3px;
      height: 1rem;
      background: #2563EB;
      border-radius: 2px;
    }

    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
      transform: translateY(8px);
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .comparison-item {
      background: #F8FAFC;
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 0.875rem;
    }

    .comparison-item:last-child {
      margin-bottom: 0;
    }

    .compare-scale {
      height: 0.5rem;
      border-radius: 9999px;
      overflow: hidden;
      background: currentColor;
      opacity: 0.15;
    }

    .compare-fill {
      height: 100%;
      border-radius: 9999px;
      transition: width 1s ease-out;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- 顶部蓝色渐变头部 -->
  <header class="bg-gradient-to-br from-blue-500 to-blue-700 text-white px-5 pt-10 pb-14 rounded-b-[2rem] relative overflow-hidden">
    <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/4"></div>
    <div class="max-w-md mx-auto relative">
      <a href="index.html" class="inline-flex items-center gap-1 text-blue-100 text-sm mb-5 hover:text-white transition">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
          <path d="M15 19l-7-7 7-7"/>
        </svg>
        <span>返回报告列表</span>
      </a>
      <div class="flex items-start gap-4">
        <span class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white/20 backdrop-blur flex-shrink-0" id="reportIconWrap">
          <!-- 图标由 JS 渲染 -->
        </span>
        <div class="flex-1 pt-1">
          <div class="flex items-center gap-2 mb-2">
            <span id="reportTag" class="text-xs font-medium text-blue-100"></span>
            <span id="reportSeverity" class="px-2 py-0.5 rounded-full text-[10px] font-medium border"></span>
          </div>
          <h1 id="reportTitle" class="text-xl font-semibold leading-snug"></h1>
          <p id="reportSubtitle" class="text-blue-100 text-sm mt-1"></p>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-5 -mt-8 pb-28 relative z-10">

    <!-- 当前问题概况 -->
    <section class="card p-5 mb-4 fade-in" style="animation-delay: 0.05s">
      <div class="section-title">当前问题概况</div>
      <div class="grid grid-cols-3 gap-3" id="overviewGrid">
        <!-- 由 JS 生成 -->
      </div>
    </section>

    <!-- 新旧指标对比 -->
    <section class="card p-5 mb-4 fade-in" style="animation-delay: 0.1s">
      <div class="section-title" id="comparisonTitle">新旧指标对比</div>
      <p class="text-xs text-slate-400 mb-4">升级前后的关键指标变化</p>
      <div id="comparisonContent">
        <!-- 由 JS 生成 -->
      </div>
    </section>

    <!-- 当前风险隐患 -->
    <section class="card p-5 mb-4 fade-in" style="animation-delay: 0.15s">
      <div class="section-title">当前风险隐患</div>
      <ul id="riskList" class="space-y-3">
        <!-- 由 JS 生成 -->
      </ul>
    </section>

    <!-- 问题示意 -->
    <section class="card p-5 mb-4 fade-in" style="animation-delay: 0.2s">
      <div class="section-title">问题示意</div>
      <div id="diagram" class="p-5 flex items-center justify-center bg-slate-50 rounded-2xl">
        <!-- 由 JS 渲染 -->
      </div>
    </section>

    <!-- 升级/优化优势 -->
    <section class="card p-5 mb-4 fade-in" style="animation-delay: 0.25s">
      <div class="section-title" id="benefitsTitle">升级优势</div>
      <ul id="benefitsList" class="space-y-3">
        <!-- 由 JS 生成 -->
      </ul>
    </section>

    <!-- 建议操作 -->
    <section class="card p-5 mb-4 fade-in" style="animation-delay: 0.3s">
      <div class="section-title">建议操作</div>
      <ul id="recommendedActions" class="space-y-3">
        <!-- 由 JS 生成 -->
      </ul>
    </section>

    <!-- 解决方案 -->
    <section class="card p-5 mb-4 fade-in" style="animation-delay: 0.35s" id="solutionSection">
      <div class="section-title" id="solutionTitle">解决方案</div>
      <p class="text-xs text-slate-400 mb-4" id="solutionSubtitle"></p>
      <div id="solutionSteps" class="space-y-4">
        <!-- 由 JS 生成 -->
      </div>
    </section>

  </main>


  <script src="data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const reportId = params.get('id');
    const report = reports.find(r => r.id === reportId);

    if (!report) {
      document.querySelector('main').innerHTML = `
        <div class="text-center pt-16 fade-in">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-50 text-blue-300 mb-4">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
          <h2 class="text-base font-semibold text-slate-900 mb-2">未找到报告</h2>
          <p class="text-sm text-slate-500 mb-6">请从首页选择一份报告查看</p>
          <a href="index.html" class="inline-block bg-blue-600 text-white px-6 py-2.5 rounded-xl text-sm font-semibold">返回首页</a>
        </div>
      `;
      throw new Error('Report not found: ' + reportId);
    }

    // 填充头部
    document.getElementById('reportIconWrap').innerHTML = icon(report.icon, 'w-7 h-7 text-white');
    document.getElementById('reportTag').textContent = report.tags[0];
    document.getElementById('reportSeverity').textContent = severityText(report.severity);
    document.getElementById('reportSeverity').className = 'px-2 py-0.5 rounded-full text-[10px] font-medium border bg-white/20 text-white border-white/30';
    document.getElementById('reportTitle').textContent = report.title;
    document.getElementById('reportSubtitle').textContent = report.subtitle || '';

    // 概况
    document.getElementById('overviewGrid').innerHTML = report.overview.map(item => `
      <div class="text-center p-3 bg-slate-50 rounded-xl">
        <div class="text-xs text-slate-400 mb-1">${item.label}</div>
        <div class="text-base font-semibold text-slate-900">${item.value}</div>
      </div>
    `).join('');

    // 获取提升描述文字
    function getImprovementText(oldValue, newValue, direction) {
      if (direction === 'lower') {
        const pct = Math.round(((oldValue - newValue) / oldValue) * 100);
        return `降低 ${pct}%`;
      }
      const ratio = newValue / oldValue;
      if (ratio >= 2) {
        const times = ratio % 1 === 0 ? ratio : ratio.toFixed(1);
        return `提升 ${times} 倍`;
      }
      const pct = Math.round((ratio - 1) * 100);
      return `提升 ${pct}%`;
    }

    // 对比模块
    document.getElementById('comparisonTitle').textContent = report.comparison.title || '新旧指标对比';
    document.getElementById('comparisonContent').innerHTML = report.comparison.metrics.map(m => {
      const direction = m.direction || 'higher';
      const improvement = getImprovementText(m.oldValue, m.newValue, direction);
      const maxVal = Math.max(m.oldValue, m.newValue) * 1.05;
      const oldWidth = Math.max((m.oldValue / maxVal) * 100, 3);
      const newWidth = Math.max((m.newValue / maxVal) * 100, 3);
      const isLowerBetter = direction === 'lower';

      return `
        <div class="comparison-item">
          <div class="text-sm font-semibold text-slate-900 mb-1">${m.label}</div>
          ${m.normalRange ? `<div class="text-[10px] text-emerald-500 font-medium mb-3">正常范围：${m.normalRange}</div>` : '<div class="mb-3"></div>'}

          <div class="flex items-stretch gap-2 sm:gap-3 mb-4">
            <!-- 异常值 -->
            <div class="flex-1 bg-white rounded-xl p-3 text-center border ${m.normalRange ? 'border-rose-200' : 'border-slate-200'}">
              <div class="text-[10px] ${m.normalRange ? 'text-rose-400' : 'text-slate-400'} mb-1">${m.normalRange ? '当前异常' : '升级前'}</div>
              <div class="text-xl font-bold ${m.normalRange ? 'text-rose-500' : 'text-slate-600'}">${m.oldValue}</div>
              <div class="text-[10px] ${m.normalRange ? 'text-rose-300' : 'text-slate-400'}">${m.unit}</div>
            </div>

            <!-- 提升箭头 -->
            <div class="flex flex-col items-center justify-center px-1">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 ${isLowerBetter ? 'text-emerald-500' : 'text-blue-600'}">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
              <div class="text-[10px] font-bold ${isLowerBetter ? 'text-emerald-500' : 'text-blue-600'} whitespace-nowrap mt-0.5">${improvement}</div>
            </div>

            <!-- 正常值 -->
            <div class="flex-1 bg-gradient-to-br ${m.normalRange ? 'from-emerald-500 to-emerald-600' : 'from-blue-500 to-blue-700'} rounded-xl p-3 text-center text-white shadow-md ${m.normalRange ? 'shadow-emerald-200' : 'shadow-blue-200'}">
              <div class="text-[10px] ${m.normalRange ? 'text-emerald-100' : 'text-blue-100'} mb-1">${m.normalRange ? '正常值' : '升级后'}</div>
              <div class="text-xl font-bold">${m.newValue}</div>
              <div class="text-[10px] ${m.normalRange ? 'text-emerald-100' : 'text-blue-100'}">${m.unit}</div>
            </div>
          </div>

          <!-- 可视化对比条 -->
          <div class="space-y-2">
            <div class="flex items-center gap-2">
              <span class="text-[10px] ${m.normalRange ? 'text-rose-400' : 'text-slate-400'} w-10 flex-shrink-0">${m.normalRange ? '异常' : '升级前'}</span>
              <div class="flex-1 h-2 rounded-full overflow-hidden ${m.normalRange ? 'bg-rose-100' : 'bg-slate-200'}">
                <div class="h-full ${m.normalRange ? 'bg-rose-400' : 'bg-slate-400'} rounded-full" style="width: ${oldWidth}%"></div>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-[10px] ${m.normalRange ? 'text-emerald-600' : 'text-blue-600'} font-medium w-10 flex-shrink-0">${m.normalRange ? '正常' : '升级后'}</span>
              <div class="flex-1 h-2 rounded-full overflow-hidden ${m.normalRange ? 'bg-emerald-100' : 'bg-blue-100'}">
                <div class="h-full ${m.normalRange ? 'bg-emerald-500' : 'bg-blue-500'} rounded-full" style="width: ${newWidth}%"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // 风险隐患
    document.getElementById('riskList').innerHTML = report.risks.map(risk => `
      <li class="flex items-start gap-3">
        <span class="flex-shrink-0 w-5 h-5 rounded-full bg-rose-50 text-rose-500 flex items-center justify-center mt-0.5">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
            <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
        </span>
        <span class="text-sm text-slate-700 leading-relaxed">${risk}</span>
      </li>
    `).join('');

    // 问题示意
    document.getElementById('diagram').innerHTML = renderDiagram(report.diagram, report);

    // 升级优势
    document.getElementById('benefitsTitle').textContent = report.benefits.title || '优化优势';
    document.getElementById('benefitsList').innerHTML = report.benefits.items.map(benefit => `
      <li class="flex items-start gap-3">
        <span class="flex-shrink-0 w-5 h-5 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center mt-0.5">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
            <path d="M5 13l4 4L19 7"/>
          </svg>
        </span>
        <span class="text-sm text-slate-700 leading-relaxed">${benefit}</span>
      </li>
    `).join('');

    // 建议操作
    document.getElementById('recommendedActions').innerHTML = report.recommendedActions.map((a, i) => `
      <li class="flex items-start gap-3">
        <span class="flex-shrink-0 w-6 h-6 rounded-full bg-blue-600 text-white text-[10px] flex items-center justify-center font-semibold mt-0.5">${i + 1}</span>
        <span class="text-sm text-slate-700 leading-relaxed">${a}</span>
      </li>
    `).join('');


    // 解决方案
    const solutionSection = document.getElementById('solutionSection');
    if (report.solution && report.solution.steps && report.solution.steps.length > 0) {
      document.getElementById('solutionTitle').textContent = report.solution.title || '解决方案';
      document.getElementById('solutionSubtitle').textContent = report.solution.subtitle || '';
      document.getElementById('solutionSteps').innerHTML = report.solution.steps.map((step, i) => `
        <div class="relative pl-10 pb-4 ${i < report.solution.steps.length - 1 ? 'border-l-2 border-blue-100 ml-3' : 'ml-3'}">
          <!-- 步骤编号圆 -->
          <div class="absolute left-0 top-0 -translate-x-1/2 w-7 h-7 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-semibold shadow-md shadow-blue-200">
            ${i + 1}
          </div>
          <!-- 步骤图标 -->
          <div class="flex items-center gap-2 mb-2">
            <span class="inline-flex items-center justify-center w-6 h-6 rounded-lg bg-blue-50 text-blue-500">
              ${icon(step.icon || 'check', 'w-4 h-4')}
            </span>
            <h4 class="text-sm font-semibold text-slate-900">${step.title}</h4>
          </div>
          <!-- 步骤描述 -->
          <p class="text-xs text-slate-600 leading-relaxed mb-2">${step.description}</p>
          <!-- 小贴士 -->
          ${step.tip ? `
          <div class="flex items-start gap-2 px-3 py-2 rounded-lg bg-amber-50 border border-amber-100">
            <svg class="w-3.5 h-3.5 text-amber-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 18v-5.25m0 0a6.01 6.01 0 001.5-.189m-1.5.189a6.01 6.01 0 01-1.5-.189m3.75 7.478a12.06 12.06 0 01-4.5 0m3.75 2.383a14.406 14.406 0 01-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 10-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/>
            </svg>
            <span class="text-[11px] text-amber-700 leading-relaxed">${step.tip}</span>
          </div>
          ` : ''}
        </div>
      `).join('');
    } else {
      solutionSection.style.display = 'none';
    }
  </script>
</body>
</html>
